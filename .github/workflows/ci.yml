name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: uv sync --dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy py_clickhouse_migrator/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 19000:9000
        env:
          CLICKHOUSE_DB: test
          CLICKHOUSE_USER: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev

      - name: Run tests
        run: uv run pytest -v --cov=py_clickhouse_migrator --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: "python-${{ matrix.python-version }}"
          token: ${{ secrets.CODECOV_TOKEN }}

  test-cluster:
    name: Test (Cluster)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: uv sync --dev

      - name: Start ClickHouse cluster
        run: docker compose -f docker-compose.cluster.yml up -d --wait

      - name: Wait for cluster to be ready
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.cluster.yml exec -T clickhouse-01 \
              clickhouse-client --query "SELECT count() FROM system.clusters WHERE cluster = 'test_cluster'" 2>/dev/null | grep -q "1"; then
              echo "Cluster ready"
              break
            fi
            echo "Waiting for cluster... ($i/30)"
            sleep 2
          done

      - name: Run cluster tests
        run: uv run pytest tests/ -m cluster -v --cov=py_clickhouse_migrator --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: cluster
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Stop cluster
        if: always()
        run: docker compose -f docker-compose.cluster.yml down
