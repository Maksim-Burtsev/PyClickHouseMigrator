site_name: PyClickHouseMigrator
site_description: SQL-first ClickHouse migrations for Python teams.
site_url: https://maksim-burtsev.github.io/PyClickHouseMigrator/

repo_url: https://github.com/Maksim-Burtsev/PyClickHouseMigrator
repo_name: Maksim-Burtsev/PyClickHouseMigrator
edit_uri: blob/master/docs/

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

exclude_docs: |
  README.md

nav:
  - Home: index.md
  - Guides:
      - Migration format: migration-format.md
      - Baseline existing databases: baseline.md
      - Cluster mode: cluster-mode.md
      - CI/CD usage: ci-cd.md
      - Docker usage: docker.md
      - Python API: python-api.md
      - Troubleshooting: troubleshooting.md
      - Known limitations: known-limitations.md
  - Release notes:
      - Version 2.0: release-2.0.md
